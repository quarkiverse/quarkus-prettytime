name: "Quarkus ecosystem CI"
on:
  workflow_dispatch:
  watch:
    types: [started]

permissions: 
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: quarkiverse/.github/.github/workflows/quarkus-ecosystem-ci.yml@gastaldi-patch-1
    secrets: inherit
    with:
      ecosystem_ci_repo: gastaldi/quarkus-ecosystem-ci
      ecosystem_ci_repo_branch: build_from_tag
      ecosystem_ci_repo_path: quarkiverse-prettytime
      java_version: 17
